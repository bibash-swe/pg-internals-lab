services:
  primary:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wal_lab
    ports:
      - "5434:5432"
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c synchronous_commit=on
      -c wal_keep_size=256MB
    # wal_level=replica: the minimum WAL detail level that includes
    # everything a streaming replica needs to reconstruct changes.
    # max_wal_senders: how many concurrent replica connections the
    # primary will serve WAL to -- 10 is generous headroom for a
    # single-replica lab.
    # wal_keep_size: retains this much WAL on the primary even after
    # a replica has consumed it, so a replica that briefly disconnects
    # doesn't immediately need a full re-sync.
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wal_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

  replica:
    image: postgres:16
    depends_on:
      primary:
        condition: service_healthy
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGPASSWORD: replicator_password
    volumes:
      - replica_data:/var/lib/postgresql/data
      - ./replica-entrypoint.sh:/replica-entrypoint.sh
    entrypoint: ["bash", "/replica-entrypoint.sh"]
    # The replica cannot use the standard postgres image entrypoint
    # directly -- it needs to run pg_basebackup FIRST, copying the
    # primary's entire current dataset, before postgres itself ever
    # starts. See replica-entrypoint.sh for exactly what this does
    # and why it's a separate script rather than inline here.

volumes:
  primary_data:
  replica_data: